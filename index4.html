<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReputaSync Pro | Phillipa's Hot Shito</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="theme-color" content="#e11d48">
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root { --bg: #0f172a; --sidebar: #020617; --card: #1e293b; --primary: #e11d48; --text: #f8fafc; --muted: #94a3b8; --accent: #fbbf24; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 240px; background: var(--sidebar); height: 100%; padding: 25px; position: fixed; left: 0; top: 0; display: flex; flex-direction: column; border-right: 1px solid #1e293b; z-index: 100; }
        
        /* LOGO STYLING */
        .logo-container { text-align: center; margin-bottom: 30px; }
        .logo-img { width: 80px; height: auto; margin-bottom: 10px; border-radius: 12px; }
        .brand-text { font-size: 20px; font-weight: 800; color: var(--primary); letter-spacing: -1px; }

        .menu-item { display: flex; align-items: center; gap: 12px; padding: 14px; border-radius: 10px; margin-bottom: 8px; cursor: pointer; color: var(--muted); transition: 0.2s; }
        .menu-item:hover, .menu-item.active { background: #1e293b; color: white; }
        .main { margin-left: 240px; width: calc(100% - 240px); overflow-y: auto; height: 100%; }
        header { padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1e293b; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 10; }
        .container { padding: 40px; max-width: 900px; margin: auto; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid #334155; }
        .card { background: var(--card); padding: 25px; border-radius: 15px; margin-bottom: 25px; border: 1px solid #334155; }
        input, textarea, select { width: 100%; padding: 12px; margin: 10px 0 20px 0; border: 1px solid #334155; border-radius: 8px; background: #0f172a; color: white; }
        button { padding: 12px 20px; background: var(--primary); border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; width: 100%; }
        .hidden { display: none !important; }
        .review-item { padding: 20px 0; border-bottom: 1px solid #334155; }
        @media (max-width: 768px) { .sidebar { width: 70px; } .sidebar span, .brand-text { display: none; } .main { margin-left: 70px; width: calc(100% - 70px); } }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo-container">
        <img src="web-app-manifest-192x192.png" alt="Logo" class="logo-img">
        <div class="brand-text">ReputaSync</div>
    </div>
    <div class="menu-item active" onclick="showView('dashboard', this)"><i data-lucide="layout-dashboard"></i><span>Dashboard</span></div>
    <div class="menu-item" onclick="showView('reviews', this)"><i data-lucide="plus-circle"></i><span>Add Review</span></div>
    <div class="menu-item" onclick="showView('share', this)"><i data-lucide="qr-code"></i><span>Install App</span></div>
</div>

<div class="main">
    <header>
        <h2>Phillipa's Hot Shito</h2>
        <div id="user-status" style="font-size: 12px; color: var(--muted);">Cloud: Syncing...</div>
        <button onclick="logout()" style="width:auto; background:transparent; color:var(--muted);">Logout</button>
    </header>

    <div class="container">
        <div id="view-auth" class="card">
            <h2>Admin Access</h2>
            <input id="email" type="email" placeholder="Email">
            <input id="password" type="password" placeholder="Password">
            <button onclick="handleAuth()">Login / Sign Up</button>
            <button onclick="forgotPassword()" style="background:transparent; font-size:12px; margin-top:10px; text-decoration:underline;">Forgot Password?</button>
        </div>

        <div id="view-dashboard" class="hidden">
            <div class="stats">
                <div class="stat-card"><h3>Reviews</h3><p id="stat-total">0</p></div>
                <div class="stat-card"><h3>Positive</h3><p id="stat-pos" style="color:#22c55e">0</p></div>
                <div class="stat-card"><h3>Status</h3><p style="font-size:16px; color:var(--accent)">Live ✓</p></div>
            </div>
            <div class="card"><h3>Feed</h3><div id="dashboard-feed" style="margin-top:10px; color:var(--muted);">No data.</div></div>
        </div>

        <div id="view-reviews" class="hidden">
            <div class="card">
                <h3>Add Feedback</h3>
                <input id="cust-name" placeholder="Name">
                <select id="cust-rating"><option value="5">⭐⭐⭐⭐⭐</option><option value="4">⭐⭐⭐⭐</option><option value="3">⭐⭐⭐</option></select>
                <textarea id="cust-review" placeholder="Review content..."></textarea>
                <button onclick="uploadReview()">Save & Reply</button>
            </div>
            <div id="cloud-list"></div>
        </div>

        <div id="view-share" class="hidden">
            <div class="card" style="text-align:center;">
                <img id="qr-img" src="" style="width:200px; background:white; padding:10px; border-radius:10px;">
                <p style="margin-top:20px;">Scan to open <strong>Phillipa's App</strong></p>
                <button onclick="copyAppLink()" style="background:#334155; margin-top:15px;">Copy Link</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, where } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAub5sPg3eUHRaKkXks2HfwCQfcp4QznNI",
        authDomain: "reviews-a27a3.firebaseapp.com",
        projectId: "reviews-a27a3",
        storageBucket: "reviews-a27a3.firebasestorage.app",
        messagingSenderId: "740168541797",
        appId: "1:740168541797:web:2cf46b8f4bdf56a785c88c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    window.showView = (v, el) => {
        document.querySelectorAll('.container > div').forEach(d => d.classList.add('hidden'));
        document.getElementById('view-' + v).classList.remove('hidden');
        document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
        if(el) el.classList.add('active');
    };

    window.handleAuth = async () => {
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        try { await signInWithEmailAndPassword(auth, e, p); } 
        catch (err) { try { await createUserWithEmailAndPassword(auth, e, p); } catch(e2) { alert(e2.message); } }
    };

    window.forgotPassword = async () => {
        const e = document.getElementById('email').value;
        if(!e) return alert("Enter email first");
        await sendPasswordResetEmail(auth, e);
        alert("Reset link sent!");
    };

    window.logout = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('user-status').innerText = user.email;
            showView('dashboard');
            syncData(user.uid);
            document.getElementById('qr-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(window.location.href)}&color=e11d48`;
        } else {
            showView('auth');
        }
    });

    window.uploadReview = async () => {
        const name = document.getElementById('cust-name').value;
        const text = document.getElementById('cust-review').value;
        const rating = document.getElementById('cust-rating').value;
        const reply = `Hi ${name}, thanks for supporting Phillipa's Hot Shito! 🔥`;
        await addDoc(collection(db, "reviews"), { userId: auth.currentUser.uid, name, text, rating: parseInt(rating), reply, timestamp: serverTimestamp() });
        alert("Saved!");
    };

    function syncData(uid) {
        const q = query(collection(db, "reviews"), where("userId", "==", uid), orderBy("timestamp", "desc"));
        onSnapshot(q, (snap) => {
            const list = document.getElementById('cloud-list');
            let pos = 0;
            list.innerHTML = "";
            snap.forEach(doc => {
                const r = doc.data();
                if(r.rating >= 4) pos++;
                list.innerHTML += `<div class="review-item"><strong>${r.name}</strong><p>${r.text}</p></div>`;
            });
            document.getElementById('stat-total').innerText = snap.size;
            document.getElementById('stat-pos').innerText = pos;
        });
    }

    if ("serviceWorker" in navigator) { navigator.serviceWorker.register("service-worker.js"); }
    lucide.createIcons();
</script>
</body>
</html>
